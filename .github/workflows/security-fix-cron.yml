name: Security Fix (Scheduled)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Security Checks
    uses: ./.github/workflows/_security-checks.yml

  security-fix:
    name: Security Fix Agent
    needs: security
    if: ${{ always() && needs.security.result == 'failure' }}
    uses: ./.github/workflows/_security-fix-agent.yml
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    secrets: inherit
